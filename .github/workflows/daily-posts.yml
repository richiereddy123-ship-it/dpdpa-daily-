name: Daily DPDPA Posts

on:
  schedule:
    # 02:30 UTC = 08:00 IST every day
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install feedparser requests

      - name: Generate posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_posts.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --cached --quiet; then
            echo "No new posts to commit."
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Daily DPDPA posts: $(date -u +'%Y-%m-%d')"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Build and Deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run pages-deploy.yml --ref main
